<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromeCast WebRTC Receiver</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #videoContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #remoteVideo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s;
        }
        #status {
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
        }
        #fps {
            font-size: 14px;
            font-family: 'Consolas', monospace;
            color: #0f0;
        }
        .connecting { color: #ff0; }
        .connected { color: #0f0; }
        .error { color: #f00; }
        #splashScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a2e, #000);
            z-index: 20;
            transition: opacity 0.5s;
        }
        #splashScreen h1 { font-size: 28px; margin-bottom: 10px; }
        #splashScreen p { color: #888; font-size: 16px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #4285f4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { opacity: 0; pointer-events: none; }
        #debugLog {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            max-height: 40vh;
            overflow-y: auto;
            background: rgba(0,0,0,0.85);
            font-family: 'Consolas', monospace;
            font-size: 12px;
            padding: 8px;
            z-index: 30;
            color: #0f0;
        }
        #debugLog div { padding: 1px 0; }
        #debugLog .err { color: #f44; }
        #debugLog .warn { color: #fa0; }
    </style>
</head>
<body>
    <div id="splashScreen">
        <h1>ChromeCast WebRTC Receiver v3</h1>
        <div class="spinner"></div>
        <p id="splashStatus">Initializing...</p>
    </div>

    <div id="videoContainer">
        <video id="remoteVideo" autoplay playsinline></video>
        <div id="overlay">
            <span id="status" class="connecting">Connecting...</span>
            <span id="fps">FPS: --</span>
        </div>
    </div>

    <div id="debugLog"></div>

    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script>
        const CAST_CHANNEL = 'urn:x-cast:com.webrtc.signaling';
        const statusEl = document.getElementById('status');
        const fpsEl = document.getElementById('fps');
        const splashEl = document.getElementById('splashScreen');
        const splashStatusEl = document.getElementById('splashStatus');
        const videoEl = document.getElementById('remoteVideo');
        const debugLogEl = document.getElementById('debugLog');

        let pc = null;
        let sendMessage = null;
        let isCastDevice = false;
        let castSenderId = null;

        function log(msg, level) {
            console.log(`[Receiver] ${msg}`);
            const div = document.createElement('div');
            if (level === 'err') div.className = 'err';
            if (level === 'warn') div.className = 'warn';
            const ts = new Date().toLocaleTimeString();
            div.textContent = `[${ts}] ${msg}`;
            debugLogEl.appendChild(div);
            debugLogEl.scrollTop = debugLogEl.scrollHeight;
        }

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = cls || '';
            splashStatusEl.textContent = text;
        }

        function initSignaling() {
            log('initSignaling called');
            log('cast available: ' + (typeof cast !== 'undefined'));
            log('cast.framework: ' + (typeof cast !== 'undefined' && !!cast.framework));

            if (typeof cast !== 'undefined' && cast.framework) {
                initCastSignaling();
            } else {
                log('Cast SDK not available, falling back to WebSocket');
                initWebSocketSignaling();
            }
        }

        function initCastSignaling() {
            isCastDevice = true;
            log('Initializing Cast message bus signaling');
            setStatus('Cast device - waiting for sender...', 'connecting');

            try {
                const context = cast.framework.CastReceiverContext.getInstance();
                log('Got CastReceiverContext');

                context.addCustomMessageListener(CAST_CHANNEL, event => {
                    try {
                        log(`Cast msg from ${event.senderId}: type=${event.data?.type}`);
                        castSenderId = event.senderId;
                        handleSignalingMessage(event.data);
                    } catch (e) {
                        log('Error handling cast msg: ' + e.message, 'err');
                    }
                });
                log('Custom message listener registered for ' + CAST_CHANNEL);

                sendMessage = (msg) => {
                    if (castSenderId) {
                        try {
                            log(`Cast send: ${msg.type} to ${castSenderId}`);
                            context.sendCustomMessage(CAST_CHANNEL, castSenderId, msg);
                            log('Cast send OK');
                        } catch (e) {
                            log('Cast send error: ' + e.message, 'err');
                        }
                    } else {
                        log('No Cast sender ID yet, cannot send', 'warn');
                    }
                };

                context.addEventListener(
                    cast.framework.system.EventType.SENDER_CONNECTED, event => {
                        log('SENDER_CONNECTED: ' + event.senderId);
                        castSenderId = event.senderId;
                        setStatus('Sender connected', 'connecting');
                        sendMessage({ type: 'Ready', payload: 'cast-receiver' });
                    });

                context.addEventListener(
                    cast.framework.system.EventType.SENDER_DISCONNECTED, event => {
                        log('SENDER_DISCONNECTED: ' + (event.senderId || 'unknown'), 'warn');
                        if (context.getSenders().length === 0) {
                            log('No more senders');
                            setStatus('No senders', 'error');
                        }
                    });

                context.addEventListener(
                    cast.framework.system.EventType.ERROR, event => {
                        log('Cast ERROR event: ' + JSON.stringify(event), 'err');
                    });

                const options = new cast.framework.CastReceiverOptions();
                options.disableIdleTimeout = true;
                options.customNamespaces = {};
                options.customNamespaces[CAST_CHANNEL] = cast.framework.system.MessageType.JSON;
                log('Starting Cast receiver context...');
                context.start(options);
                log('Cast receiver context started');

                const senders = context.getSenders();
                log('Current senders: ' + senders.length);
                if (senders.length > 0) {
                    castSenderId = senders[0].id;
                    log('Using existing sender: ' + castSenderId);
                    sendMessage({ type: 'Ready', payload: 'cast-receiver' });
                }

            } catch (e) {
                log('Cast init FATAL: ' + e.message, 'err');
                log('Stack: ' + e.stack, 'err');
                initWebSocketSignaling();
            }
        }

        function initWebSocketSignaling() {
            const urlParams = new URLSearchParams(location.search);
            const wsHost = urlParams.get('wshost') || location.hostname;
            const wsPort = urlParams.get('wsport') || location.port || '8088';
            const WS_URL = `ws://${wsHost}:${wsPort}`;

            log(`Connecting WebSocket to ${WS_URL}`);
            setStatus('Connecting WebSocket...', 'connecting');

            const ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                log('WebSocket connected');
                setStatus('Signaling connected', 'connecting');
                ws.send(JSON.stringify({ type: 'Ready', payload: 'browser-receiver' }));
            };

            ws.onmessage = (evt) => {
                const msg = JSON.parse(evt.data);
                log(`WS received: ${msg.type}`);
                handleSignalingMessage(msg);
            };

            ws.onclose = () => {
                log('WebSocket disconnected', 'warn');
                setStatus('Disconnected - retrying...', 'error');
                setTimeout(() => initWebSocketSignaling(), 3000);
            };

            ws.onerror = () => {
                log('WebSocket error', 'err');
                setStatus('Connection error', 'error');
            };

            sendMessage = (msg) => {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(msg));
                }
            };
        }

        function handleSignalingMessage(msg) {
            log('handleSignalingMessage: ' + msg.type);
            switch (msg.type) {
                case 'SdpOffer':
                    handleOffer(msg.payload);
                    break;
                case 'IceCandidate':
                    handleIceCandidate(msg.payload);
                    break;
                default:
                    log('Unknown message type: ' + msg.type, 'warn');
            }
        }

        async function handleOffer(sdp) {
            try {
                log('handleOffer: creating RTCPeerConnection');
                log('RTCPeerConnection available: ' + (typeof RTCPeerConnection !== 'undefined'));

                const config = {
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                };
                pc = new RTCPeerConnection(config);
                log('RTCPeerConnection created');

                pc.ontrack = (event) => {
                    log(`Track received: ${event.track.kind}`);
                    if (event.track.kind === 'video') {
                        videoEl.srcObject = event.streams[0];
                        splashEl.classList.add('hidden');
                        setStatus('Streaming', 'connected');
                        startFpsCounter();
                    }
                };

                pc.onicecandidate = (event) => {
                    if (event.candidate && sendMessage) {
                        log('Sending ICE candidate');
                        sendMessage({
                            type: 'IceCandidate',
                            payload: JSON.stringify(event.candidate.toJSON())
                        });
                    }
                };

                pc.onconnectionstatechange = () => {
                    log(`WebRTC state: ${pc.connectionState}`);
                    if (pc.connectionState === 'connected') {
                        setStatus('Connected', 'connected');
                        debugLogEl.style.display = 'none';
                    } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                        setStatus('Disconnected', 'error');
                    }
                };

                await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp }));
                log('Remote description set (offer applied)');

                const transceivers = pc.getTransceivers();
                log('Transceivers after offer: ' + transceivers.length);
                for (const t of transceivers) {
                    log(`  mid=${t.mid} dir=${t.direction} kind=${t.receiver?.track?.kind}`);
                }

                const answer = await pc.createAnswer();
                log('Answer created, SDP length=' + answer.sdp.length);

                await pc.setLocalDescription(answer);
                log('Local description set (answer applied)');

                sendMessage({ type: 'SdpAnswer', payload: answer.sdp });
                log('SDP answer sent');
            } catch (e) {
                log('handleOffer ERROR: ' + e.message, 'err');
                log('Stack: ' + e.stack, 'err');
            }
        }

        async function handleIceCandidate(candidateJson) {
            try {
                const candidate = JSON.parse(candidateJson);
                if (pc && candidate.candidate) {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    log('Added remote ICE candidate');
                }
            } catch (e) {
                log(`ICE error: ${e.message}`, 'err');
            }
        }

        function startFpsCounter() {
            let lastFrames = 0;
            setInterval(() => {
                if (videoEl.getVideoPlaybackQuality) {
                    const q = videoEl.getVideoPlaybackQuality();
                    const frames = q.totalVideoFrames - lastFrames;
                    lastFrames = q.totalVideoFrames;
                    fpsEl.textContent = `FPS: ${frames}`;
                }
            }, 1000);
        }

        log('Page loaded, calling initSignaling');
        initSignaling();
    </script>
</body>
</html>
